        - table:
            source_catalog: db1
            source_schema: dbo
            source_table: products
            destination_catalog: yas_catalog
            destination_schema: alinta
        - table:
            source_catalog: db1
            source_schema: dbo
            source_table: customers
            destination_catalog: yas_catalog
            destination_schema: alinta
