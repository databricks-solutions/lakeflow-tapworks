        pipelines.cdcApplierFetchMetadataTimeoutSeconds: '600'
      ingestion_definition:
        ingestion_gateway_id: ${resources.pipelines.yas_project_pipeline_yas_project_gateway_1.id}
        objects:
        - table:
            source_catalog: db1
            source_schema: dbo
            source_table: transactions
            destination_catalog: yas_catalog
            destination_schema: alinta
