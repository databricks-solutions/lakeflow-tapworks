resources:
  pipelines:
    tapworks_project_pipeline_ingestion_1:
      name: tapworks_project_ingestion_1
      configuration:
        pipelines.cdcApplierFetchMetadataTimeoutSeconds: '600'
      ingestion_definition:
        ingestion_gateway_id: ${resources.pipelines.tapworks_project_pipeline_tapworks_project_gateway_1.id}
        objects:
        - table:
            source_catalog: db1
            source_schema: dbo
            source_table: orders
            destination_catalog: tapworks_catalog
            destination_schema: tapworks
            destination_table: orders
    tapworks_project_pipeline_ingestion_2:
      name: tapworks_project_ingestion_2
      configuration:
        pipelines.cdcApplierFetchMetadataTimeoutSeconds: '600'
      ingestion_definition:
        ingestion_gateway_id: ${resources.pipelines.tapworks_project_pipeline_tapworks_project_gateway_1.id}
        objects:
        - table:
            source_catalog: db1
            source_schema: dbo
            source_table: products
            destination_catalog: tapworks_catalog
            destination_schema: tapworks
            destination_table: products
        - table:
            source_catalog: db1
            source_schema: dbo
            source_table: customers
            destination_catalog: tapworks_catalog
            destination_schema: tapworks
            destination_table: customers
