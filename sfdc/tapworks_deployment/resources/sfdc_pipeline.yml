resources:
  pipelines:
    pipeline_sfdc_tapworks_business_unit1_1:
      name: SFDC Ingestion - tapworks_business_unit1_1
      catalog: ${var.dest_catalog}
      ingestion_definition:
        connection_name: ${var.sfdc_connection_name}
        objects:
        - table:
            source_schema: objects
            source_table: Account
            destination_catalog: ${var.dest_catalog}
            destination_schema: ${var.dest_schema}
            destination_table: Account
            table_configuration:
              include_columns:
              - Id
              - Name
              - Type
              - Industry
              - AnnualRevenue
              - SystemModstamp
              - IsDeleted
        - table:
            source_schema: objects
            source_table: Contact
            destination_catalog: ${var.dest_catalog}
            destination_schema: ${var.dest_schema}
            destination_table: Contact
        - table:
            source_schema: objects
            source_table: Campaign
            destination_catalog: ${var.dest_catalog}
            destination_schema: ${var.dest_schema}
            destination_table: Campaign
    pipeline_sfdc_tapworks_business_unit1_2:
      name: SFDC Ingestion - tapworks_business_unit1_2
      catalog: ${var.dest_catalog}
      ingestion_definition:
        connection_name: ${var.sfdc_connection_name}
        objects:
        - table:
            source_schema: objects
            source_table: Opportunity
            destination_catalog: ${var.dest_catalog}
            destination_schema: ${var.dest_schema}
            destination_table: Opportunity
            table_configuration:
              exclude_columns:
              - Description
    pipeline_sfdc_tapworks_business_unit2_1:
      name: SFDC Ingestion - tapworks_business_unit2_1
      catalog: ${var.dest_catalog}
      ingestion_definition:
        connection_name: ${var.sfdc_connection_name}
        objects:
        - table:
            source_schema: objects
            source_table: Lead
            destination_catalog: ${var.dest_catalog}
            destination_schema: ${var.dest_schema}
            destination_table: Lead
        - table:
            source_schema: objects
            source_table: Case
            destination_catalog: ${var.dest_catalog}
            destination_schema: ${var.dest_schema}
            destination_table: Case
    pipeline_sfdc_tapworks_business_unit3_1:
      name: SFDC Ingestion - tapworks_business_unit3_1
      catalog: ${var.dest_catalog}
      ingestion_definition:
        connection_name: ${var.sfdc_connection_name}
        objects:
        - table:
            source_schema: objects
            source_table: Task
            destination_catalog: ${var.dest_catalog}
            destination_schema: ${var.dest_schema}
            destination_table: Task
        - table:
            source_schema: objects
            source_table: Event
            destination_catalog: ${var.dest_catalog}
            destination_schema: ${var.dest_schema}
            destination_table: Event
  jobs:
    job_sfdc_tapworks_business_unit1_1:
      name: SFDC Pipeline Scheduler - tapworks_business_unit1_1
      schedule:
        quartz_cron_expression: 0 */15 * * * ?
        timezone_id: UTC
      tasks:
      - task_key: run_sfdc_pipeline
        pipeline_task:
          pipeline_id: ${resources.pipelines.pipeline_sfdc_tapworks_business_unit1_1.id}
    job_sfdc_tapworks_business_unit1_2:
      name: SFDC Pipeline Scheduler - tapworks_business_unit1_2
      schedule:
        quartz_cron_expression: 0 */15 * * * ?
        timezone_id: UTC
      tasks:
      - task_key: run_sfdc_pipeline
        pipeline_task:
          pipeline_id: ${resources.pipelines.pipeline_sfdc_tapworks_business_unit1_2.id}
    job_sfdc_tapworks_business_unit2_1:
      name: SFDC Pipeline Scheduler - tapworks_business_unit2_1
      schedule:
        quartz_cron_expression: 0 */30 * * * ?
        timezone_id: UTC
      tasks:
      - task_key: run_sfdc_pipeline
        pipeline_task:
          pipeline_id: ${resources.pipelines.pipeline_sfdc_tapworks_business_unit2_1.id}
    job_sfdc_tapworks_business_unit3_1:
      name: SFDC Pipeline Scheduler - tapworks_business_unit3_1
      schedule:
        quartz_cron_expression: 0 0 * * * ?
        timezone_id: UTC
      tasks:
      - task_key: run_sfdc_pipeline
        pipeline_task:
          pipeline_id: ${resources.pipelines.pipeline_sfdc_tapworks_business_unit3_1.id}
