# PostgreSQL Unity Catalog Connections
#
# This file defines Unity Catalog connections for PostgreSQL databases.
# Connections reference credentials stored in Databricks secrets.
#
# Usage:
#   1. Create secret scope and store credentials:
#      databricks secrets create-scope ${var.secret_scope}
#      databricks secrets put-secret ${var.secret_scope} postgres_username --string-value "myuser"
#      databricks secrets put-secret ${var.secret_scope} postgres_password --string-value "mypass"
#
#   2. Deploy the bundle:
#      databricks bundle deploy -t dev
#
#   3. Test connection in Databricks UI or CLI:
#      databricks connections test ${connection_name}
#
# Variables can be overridden in databricks.yml or via -var flags:
#   databricks bundle deploy -t dev \
#     -var="postgres_host=postgres.example.com" \
#     -var="postgres_database=mydb"

resources:
  connections:
    # Example PostgreSQL connection
    # Uncomment and configure as needed
    postgres_connection:
      name: ${var.postgres_connection_name}
      connection_type: POSTGRESQL
      options:
        # Host format: hostname/database
        # The database must be encoded in the host parameter for PostgreSQL
        host: "${var.postgres_host}/${var.postgres_database}"
        port: "${var.postgres_port}"
        # Reference secrets using {{secrets/scope/key}} syntax
        user: "{{secrets/${var.secret_scope}/${var.postgres_username_key}}}"
        password: "{{secrets/${var.secret_scope}/${var.postgres_password_key}}}"

      # Optional: Add comment/description
      comment: "PostgreSQL connection for Lakeflow Connect ingestion"

    # Example: Multiple connections for different databases
    # postgres_prod:
    #   connection_type: POSTGRESQL
    #   options:
    #     host: "prod-postgres.example.com/production_db"
    #     port: "5432"
    #     user: "{{secrets/prod_secrets/postgres_username}}"
    #     password: "{{secrets/prod_secrets/postgres_password}}"
    #   comment: "Production PostgreSQL database"
    #
    # postgres_staging:
    #   connection_type: POSTGRESQL
    #   options:
    #     host: "staging-postgres.example.com/staging_db"
    #     port: "5432"
    #     user: "{{secrets/staging_secrets/postgres_username}}"
    #     password: "{{secrets/staging_secrets/postgres_password}}"
    #   comment: "Staging PostgreSQL database"

# Notes:
# - Connection names must be unique within the workspace
# - The connection_type must be POSTGRESQL (case-sensitive)
# - The host parameter must include the database name: "hostname/database"
# - Secrets must exist before deploying the bundle
# - Use descriptive connection names for better organization
# - Connections can be granted to principals using:
#   databricks connections grant <connection_name> USE_CONNECTION <principal>
