variables:
  postgres_gateway_catalog:
    default: bronze
  postgres_gateway_schema:
    default: gateways

resources:
  gateways:
    gateway_postgres_1:
      name: postgres_gateway_1
      gateway_definition:
        connection_name: postgres_prod_connection
        gateway_catalog: ${var.postgres_gateway_catalog}
        gateway_schema: ${var.postgres_gateway_schema}

    gateway_postgres_2:
      name: postgres_gateway_2
      gateway_definition:
        connection_name: postgres_analytics_connection
        gateway_catalog: ${var.postgres_gateway_catalog}
        gateway_schema: ${var.postgres_gateway_schema}
