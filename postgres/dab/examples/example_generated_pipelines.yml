variables:
  dest_catalog:
    default: bronze

resources:
  pipelines:
    pipeline_postgres_ingestion_group_1:
      name: postgres_ingestion_pipeline_group_1
      catalog: ${var.dest_catalog}
      ingestion_definition:
        connection_name: postgres_prod_connection
        gateway_id: ${resources.gateways.gateway_postgres_1.id}
        objects:
        - table:
            source_catalog: mydb
            source_schema: public
            source_table: users
            destination_catalog: bronze
            destination_schema: sales
            destination_table: users
        - table:
            source_catalog: mydb
            source_schema: public
            source_table: orders
            destination_catalog: bronze
            destination_schema: sales
            destination_table: orders

    pipeline_postgres_ingestion_group_2:
      name: postgres_ingestion_pipeline_group_2
      catalog: ${var.dest_catalog}
      ingestion_definition:
        connection_name: postgres_prod_connection
        gateway_id: ${resources.gateways.gateway_postgres_1.id}
        objects:
        - table:
            source_catalog: mydb
            source_schema: public
            source_table: products
            destination_catalog: bronze
            destination_schema: inventory
            destination_table: products

    pipeline_postgres_ingestion_group_3:
      name: postgres_ingestion_pipeline_group_3
      catalog: silver
      ingestion_definition:
        connection_name: postgres_analytics_connection
        gateway_id: ${resources.gateways.gateway_postgres_2.id}
        objects:
        - table:
            source_catalog: analytics_db
            source_schema: public
            source_table: page_views
            destination_catalog: silver
            destination_schema: analytics
            destination_table: page_views
        - table:
            source_catalog: analytics_db
            source_schema: public
            source_table: user_sessions
            destination_catalog: silver
            destination_schema: analytics
            destination_table: user_sessions
