resources:
  jobs:
    job_sqlserver_1:
      name: SQL Server Pipeline Scheduler - 1
      schedule:
        quartz_cron_expression: 0 0 */7 * * ?
        timezone_id: UTC
      tasks:
      - task_key: run_pipeline
        pipeline_task:
          pipeline_id: ${resources.pipelines.pipeline_sqlserver_1.id}
    job_sqlserver_2:
      name: SQL Server Pipeline Scheduler - 2
      schedule:
        quartz_cron_expression: 0 0 */6 * * ?
        timezone_id: UTC
      tasks:
      - task_key: run_pipeline
        pipeline_task:
          pipeline_id: ${resources.pipelines.pipeline_sqlserver_2.id}
