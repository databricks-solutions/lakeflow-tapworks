resources:
  jobs:
    job_tapworks_project_ingestion_1:
      name: tapworks_project Pipeline Scheduler - 1
      schedule:
        quartz_cron_expression: 0 0 */7 * * ?
        timezone_id: UTC
      tasks:
      - task_key: run_tapworks_project_pipeline
        pipeline_task:
          pipeline_id: ${resources.pipelines.tapworks_project_pipeline_ingestion_1.id}
    job_tapworks_project_ingestion_2:
      name: tapworks_project Pipeline Scheduler - 2
      schedule:
        quartz_cron_expression: 0 */15 * * * ?
        timezone_id: UTC
      tasks:
      - task_key: run_tapworks_project_pipeline
        pipeline_task:
          pipeline_id: ${resources.pipelines.tapworks_project_pipeline_ingestion_2.id}
