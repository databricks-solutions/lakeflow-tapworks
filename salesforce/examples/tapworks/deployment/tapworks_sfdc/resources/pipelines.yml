resources:
  pipelines:
    pipeline_tapworks_business_unit1_01:
      name: Ingestion - tapworks_business_unit1_01
      catalog: tapworks_catalog
      schema: sfdc_test
      ingestion_definition:
        connection_name: sfdc-pravin-dabs
        objects:
        - table:
            source_schema: objects
            source_table: Account
            destination_catalog: tapworks_catalog
            destination_schema: sfdc_test
            destination_table: Account
            table_configuration:
              include_columns:
              - Id
              - Name
              - Type
              - Industry
              - AnnualRevenue
              - SystemModstamp
              - IsDeleted
        - table:
            source_schema: objects
            source_table: Contact
            destination_catalog: tapworks_catalog
            destination_schema: sfdc_test
            destination_table: Contact
        - table:
            source_schema: objects
            source_table: Campaign
            destination_catalog: tapworks_catalog
            destination_schema: sfdc_test
            destination_table: Campaign
